<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>onigi - photo editor</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
<h1>onigi / photo editor</h1>
<p class="sub">work in progress — no uploads, runs in the browser</p>

<div id="upload-zone" onclick="document.getElementById('file-input').click()">
  <p style="color:#888;font-size:0.9rem;">upload image</p>
  <input type="file" id="file-input" accept="image/*" style="display:none"/>
</div>

<div id="editor">
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="crop-overlay"></div>
    <div id="crop-rect"></div>
  </div>

  <div id="crop-actions">
    <button onclick="confirmCrop()">apply crop</button>
    <button onclick="cancelCrop()">cancel</button>
  </div>

  <div class="row"><label>brightness</label><input type="range" id="brightness" min="0" max="200" value="100"/><span class="val" id="val-brightness">100</span></div>
  <div class="row"><label>contrast</label><input type="range" id="contrast" min="0" max="200" value="100"/><span class="val" id="val-contrast">100</span></div>
  <div class="row"><label>saturation</label><input type="range" id="saturation" min="0" max="200" value="100"/><span class="val" id="val-saturation">100</span></div>
  <div class="row"><label>blur</label><input type="range" id="blur" min="0" max="10" value="0"/><span class="val" id="val-blur">0</span></div>
  <div class="row"><label>grayscale</label><input type="range" id="grayscale" min="0" max="100" value="0"/><span class="val" id="val-grayscale">0</span></div>
  <div class="row"><label>sepia</label><input type="range" id="sepia" min="0" max="100" value="0"/><span class="val" id="val-sepia">0</span></div>

  <hr/>

  <div class="filters">
    <span>filters:</span>
    <button class="filter-btn active" data-filter="none">none</button>
    <button class="filter-btn" data-filter="vintage">vintage</button>
    <button class="filter-btn" data-filter="cool">cool</button>
    <button class="filter-btn" data-filter="warm">warm</button>
    <button class="filter-btn" data-filter="fade">fade</button>
    <button class="filter-btn" data-filter="dramatic">dramatic</button>
  </div>

  <div class="actions">
    <button onclick="resetAll()">reset</button>
    <button onclick="changeImage()">change photo</button>
    <button id="btn-crop" onclick="toggleCrop()">crop</button>
    <button onclick="downloadImage()">download</button>
  </div>
</div>
  <script src="index.js"></script>
</body>
</html>
